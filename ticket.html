<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Ticket Booking Form</title>
</head>
<body>
    <h1>Movie Ticket Booking Form</h1>
    <form>
        <label>Select Movie :</label>
        <select name="movie">
            <option>Avengers</option>
            <option>Bat Man</option>
            <option>Shershah</option>
            <option>Spider Man</option>
        </select><br><br>
        <label>Ticket Type :</label><br><br>
        <input type="radio" name="ticket" value="Regular">Regular<br>
        <input type="radio" name="ticket" value="VIP">VIP<br><br>
        <label>Choose Snacks :</label><br><br>
        <input type="checkbox" name="snacks" value="Popcorn">Popcorn<br>
        <input type="checkbox" name="snacks" value="Nachos">Nachos<br>
        <input type="checkbox" name="snacks" value="Soft Drink">Soft Drink<br>
        <input type="checkbox" name="snacks" value="French Fries">French Fries<br><br>
        <label>Show Time :</label><br><br>
        <input type="radio" name="showtime" value="Morning">Morning<br>
        <input type="radio" name="shoetime" value="Afetrnoon">Afternoon<br>
        <input type="radio" name="showtime" value="Evening">Evening<br><br>
        <Label>Payment Methods :</Label>
        <select name="payment">
            <option>Cash</option>
            <option>Credit Card</option>
            <option>Debit card</option>
            <option>Online Payment</option>
        </select><br><br>
        <input type="submit" value="Book Ticket">
        </form>
</body>
</html>
